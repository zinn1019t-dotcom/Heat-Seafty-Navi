<body>
<div class="app-shell">
<header class="topbar">
<div class="brand">
<div class="brand-logo">
<img src="icons/favicon-512-v2.png"  alt="logo">
</div>
<div>
<h1>設定</h1>
<p>Heat Safety Navi</p>
</div>
</div>
</header>
<main class="main-content">
<h2 class="section-title">設定</h2>
<div class="settings-card">
<div class="setting-row">
<span>現在地から設定</span>
<button type="button" class="setting-action-btn" onclick="detectLocationAndSetRegion()">

            自動取得
</button>
</div>
<div class="setting-row">
<span>都道府県</span>
<select id="prefSelect" onchange="changePref(this.value)">
<option value="">選択してください</option>
<option value="北海道">北海道</option>
<option value="青森県">青森県</option>
<option value="岩手県">岩手県</option>
<option value="宮城県">宮城県</option>
<option value="秋田県">秋田県</option>
<option value="山形県">山形県</option>
<option value="福島県">福島県</option>
<option value="茨城県">茨城県</option>
<option value="栃木県">栃木県</option>
<option value="群馬県">群馬県</option>
<option value="埼玉県">埼玉県</option>
<option value="千葉県">千葉県</option>
<option value="東京都">東京都</option>
<option value="神奈川県">神奈川県</option>
<option value="新潟県">新潟県</option>
<option value="富山県">富山県</option>
<option value="石川県">石川県</option>
<option value="福井県">福井県</option>
<option value="山梨県">山梨県</option>
<option value="長野県">長野県</option>
<option value="岐阜県">岐阜県</option>
<option value="静岡県">静岡県</option>
<option value="愛知県">愛知県</option>
<option value="三重県">三重県</option>
<option value="滋賀県">滋賀県</option>
<option value="京都府">京都府</option>
<option value="大阪府">大阪府</option>
<option value="兵庫県">兵庫県</option>
<option value="奈良県">奈良県</option>
<option value="和歌山県">和歌山県</option>
<option value="鳥取県">鳥取県</option>
<option value="島根県">島根県</option>
<option value="岡山県">岡山県</option>
<option value="広島県">広島県</option>
<option value="山口県">山口県</option>
<option value="徳島県">徳島県</option>
<option value="香川県">香川県</option>
<option value="愛媛県">愛媛県</option>
<option value="高知県">高知県</option>
<option value="福岡県">福岡県</option>
<option value="佐賀県">佐賀県</option>
<option value="長崎県">長崎県</option>
<option value="熊本県">熊本県</option>
<option value="大分県">大分県</option>
<option value="宮崎県">宮崎県</option>
<option value="鹿児島県">鹿児島県</option>
<option value="沖縄県">沖縄県</option>
</select>
</div>
<div class="setting-row">
<span>地域</span>
<select id="citySelect" onchange="changeCity(this.value)">
<option value="">先に都道府県を選択</option>
</select>
</div>
<button type="button" class="setting-row" onclick="toggleMode()">
<span>表示モード</span>
<span class="value" id="modeValue">通常</span>
</button>
<div class="setting-row">
<span>通知</span>
<label class="switch">
<input type="checkbox" id="notifyToggle" onchange="toggleNotify(this.checked)">
<span class="slider"></span>
</label>
</div>
<div class="setting-row">
<span>熱中症警戒通知</span>
<label class="switch">
<input type="checkbox" id="alertToggle" onchange="toggleAlert(this.checked)">
<span class="slider"></span>
</label>
</div>
<div class="setting-row">
<span>天気更新通知</span>
<label class="switch">
<input type="checkbox" id="weatherToggle" onchange="toggleWeatherNotify(this.checked)">
<span class="slider"></span>
</label>
</div>
<div class="setting-row">
<span>お知らせ通知</span>
<label class="switch">
<input type="checkbox" id="newsToggle" onchange="toggleNewsNotify(this.checked)">
<span class="slider"></span>
</label>
</div>
</div>
<div class="info-card">
<h3>アプリについて</h3>
<p>熱中症対策ナビは、熱中症の予防・判断・学習・緊急対応を支援するアプリです。
また、沖縄県DXハイスクール推進プログラム高校生ハッカソンで優秀賞・第三回全国情報教育コンテストにて入賞した作品になります。</p>
</div>
<div class="info-card contact-box">
<h3>お問い合わせ</h3>
<p>不具合・バグ・ご要望などがあればこちらからご連絡ください。</p>
<a href="https://forms.gle/rmKZSvSEztKHeVqTA"  class="contact-btn">

お問い合わせフォーム
</a>
<p class="contact-note">

※返信が必要な場合はメールアドレスをご入力ください
</p>
</div>
