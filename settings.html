<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>設定 | 熱中症対策ナビ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">
<!-- ヘッダー -->
<header class="topbar">
<div class="brand">
<div class="brand-logo">⚙️</div>
<div>
<h1>設定</h1>
<p>Heat Safety Navi</p>
</div>
</div>
</header>
<!-- メイン -->
<main class="main-content">
<h2 class="section-title">設定</h2>
<div class="settings-card">
<button class="setting-row" onclick="setRegion()">
<span>地域設定</span>
<span class="value" id="regionValue">未設定</span>
</button>
<button class="setting-row" onclick="toggleMode()">
<span>表示モード</span>
<span class="value" id="modeValue">通常</span>
</button>
<div class="setting-row disabled-row">
<span>通知</span>
<span class="value">準備中</span>
</div>
</div>
<div class="info-card">
<h3>アプリについて</h3>
<p>

        熱中症対策ナビは、熱中症の予防・判断・学習・緊急対応を支援するアプリです。
</p>
</div>
</main>
<!-- ナビ -->
<nav class="bottom-nav">
<a class="nav-item" href="index.html">
<div class="nav-icon">🏠</div>
<div class="nav-text">ホーム</div>
</a>
<a class="nav-item" href="features.html">
<div class="nav-icon">📋</div>
<div class="nav-text">機能表</div>
</a>
<a class="nav-item active" href="settings.html">
<div class="nav-icon">⚙️</div>
<div class="nav-text">設定</div>
</a>
</nav>
</div>
<script src="app.js"></script>
</body>
</html>
