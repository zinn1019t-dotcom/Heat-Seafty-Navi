<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>設定 | 熱中症対策ナビ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-shell">
<header class="topbar">
<div class="brand">
<div class="brand-logo">⚙️</div>
<div>
<h1>設定</h1>
<p>Heat Safety Navi</p>
</div>
</div>
</header>
<main class="main-content">
<h2 class="section-title">設定</h2>
<div class="settings-card">
<!-- 都道府県 -->
<div class="setting-row">
<span>都道府県</span>
<select id="prefSelect" onchange="changePref(this.value)">
<option value="">選択してください</option>
<option value="沖縄県">沖縄県</option>
<option value="東京都">東京都</option>
<option value="大阪府">大阪府</option>
<option value="愛知県">愛知県</option>
<!-- 必要なら47都道府県全部入れる -->
</select>
</div>
<!-- 市区町村 -->
<div class="setting-row">
<span>地域</span>
<select id="citySelect" onchange="changeCity(this.value)">
<option value="">先に都道府県を選択</option>
</select>
</div>
<!-- 表示モード -->
<button type="button" class="setting-row" onclick="toggleMode()">
<span>表示モード</span>
<span class="value" id="modeValue">通常</span>
</button>
<div class="setting-row disabled-row">
<span>通知</span>
<span class="value">準備中</span>
</div>
</div>
<div class="info-card">
<h3>アプリについて</h3>
<p>熱中症対策ナビは、熱中症の予防・判断・学習・緊急対応を支援するアプリです。</p>
</div>
</main>
<nav class="bottom-nav">
<a class="nav-item" href="index.html">
<div class="nav-icon">🏠</div>
<div class="nav-text">ホーム</div>
</a>
<a class="nav-item" href="features.html">
<div class="nav-icon">📋</div>
<div class="nav-text">機能表</div>
</a>
<a class="nav-item active" href="settings.html">
<div class="nav-icon">⚙️</div>
<div class="nav-text">設定</div>
</a>
</nav>
</div>
<script src="app.js"></script>
</body>
</html>
