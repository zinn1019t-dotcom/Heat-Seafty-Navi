<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>熱中症対策ナビ</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#6c63ff" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">

    <header class="topbar">
      <div class="brand">
        <div class="brand-logo">☀️</div>
        <div>
          <h1>熱中症対策ナビ</h1>
          <p>Heat Safety Navi</p>
        </div>
      </div>
    </header>

    <main class="main-content">
      <!-- ホーム -->
      <section class="screen active" id="screen-home">
        <div class="hero-card">
          <div class="hero-badge">本日の確認</div>
          <h2>今日の熱中症リスクを確認</h2>
          <p>ここに危険度・お知らせ・おすすめ行動を表示予定</p>
        </div>

        <div class="card-list">
          <button class="feature-wide-card">
            <span class="emoji">🚑</span>
            <span class="label">119通報確認サイト</span>
          </button>

          <button class="feature-wide-card">
            <span class="emoji">🌡️</span>
            <span class="label">熱リポ</span>
          </button>

          <button class="feature-wide-card">
            <span class="emoji">📝</span>
            <span class="label">熱中症対策ナビ紹介</span>
          </button>
        </div>
      </section>

      <!-- 機能一覧 -->
      <section class="screen" id="screen-features">
        <h2 class="section-title">機能表</h2>

        <div class="feature-grid">
          <button class="feature-card">
            <div class="icon">🚫</div>
            <div class="title">やっちゃダメリスト</div>
          </button>

          <button class="feature-card">
            <div class="icon">🧑‍⚕️</div>
            <div class="title">熱中症<br>シミュレーション</div>
          </button>

          <button class="feature-card">
            <div class="icon">❓</div>
            <div class="title">熱中症クイズ</div>
          </button>

          <button class="feature-card">
            <div class="icon">☀️</div>
            <div class="title">天気予報</div>
          </button>

          <button class="feature-card">
            <div class="icon">🧊</div>
            <div class="title">熱中症予防</div>
          </button>

          <button class="feature-card">
            <div class="icon">👥</div>
            <div class="title">その他機能</div>
          </button>
        </div>
      </section>

      <!-- 設定 -->
      <section class="screen" id="screen-settings">
        <h2 class="section-title">設定</h2>

        <div class="settings-card">
          <div class="setting-row">
            <span>地域設定</span>
            <span class="value">未設定</span>
          </div>
          <div class="setting-row">
            <span>表示モード</span>
            <span class="value">通常</span>
          </div>
          <div class="setting-row">
            <span>通知</span>
            <span class="value">後日追加</span>
          </div>
        </div>

        <div class="info-card">
          <h3>アプリについて</h3>
          <p>ここに利用案内、バージョン、開発情報などを表示予定</p>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" data-target="screen-home">
        <span class="nav-icon">🏠</span>
        <span class="nav-text">ホーム</span>
      </button>
      <button class="nav-item" data-target="screen-features">
        <span class="nav-icon">📋</span>
        <span class="nav-text">機能表</span>
      </button>
      <button class="nav-item" data-target="screen-settings">
        <span class="nav-icon">⚙️</span>
        <span class="nav-text">設定</span>
      </button>
    </nav>

  </div>

  <script src="app.js"></script>
</body>
</html>
