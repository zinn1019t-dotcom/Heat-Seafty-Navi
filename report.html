<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ネツリポ</title>

  <!-- favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/favicon-192-v2.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/favicon-512-v2.png">
  <link rel="apple-touch-icon" href="icons/favicon-192-v2.png">

  <link rel="stylesheet" href="css/report.css">
</head>

<body>
<div class="app">

  <!-- ===== 上部バー ===== -->
  <div class="topbar">
    <img class="app-icon" src="icons/favicon-192-v2.png">
    <div class="topbar-text">
      ネツリポ
      <div class="sub">体調チェックAI</div>
    </div>
  </div>

  <!-- ===== チャット ===== -->
  <div id="chat" class="chat">
    <div class="day"><span id="today"></span></div>

    <div class="row theirs">
      <div class="avatar">
        <img src="icons/favicon-192-v2.png">
      </div>
      <div class="msg">
        <div class="bubble">
          今の体調を送ってね<br>
          例：頭が痛い、少しめまい
        </div>
        <div class="meta">—</div>
      </div>
    </div>
  </div>

  <!-- ===== 入力欄 ===== -->
  <div class="composer">
    <textarea id="text" placeholder="メッセージを入力"></textarea>
    <button id="send">送信</button>
  </div>

</div>

<!-- ===== 下部メニュー ===== -->
<nav class="bottom-nav">

  <a href="index.html" class="nav-item">
    <span class="nav-icon">🏠</span>
    <span class="nav-text">ホーム</span>
  </a>

  <a href="chat.html" class="nav-item active">
    <span class="nav-icon">💬</span>
    <span class="nav-text">熱リポ</span>
  </a>

  <a href="features.html" class="nav-item">
    <span class="nav-icon">📊</span>
    <span class="nav-text">機能表</span>
  </a>

</nav>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyJfoU2zYjcL7Z7iMQJNKZm9T0T9eqi7_O5kEsa45B1P7MEQlJCCyYf_ZNmeLINVFG4/exec";
const API_KEY = "neturipo_okinawa_pwa_2026_p";

const chat = document.getElementById("chat");
const text = document.getElementById("text");
const send = document.getElementById("send");

document.getElementById("today").textContent =
  new Date().toLocaleDateString("ja-JP");

function now() {
  return new Date().toLocaleTimeString("ja-JP", {
    hour: "2-digit",
    minute: "2-digit"
  });
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function nl2br(str) {
  return escapeHtml(str).replace(/\n/g, "<br>");
}

function scrollChat() {
  chat.scrollTop = chat.scrollHeight;
}

function addMine(msg) {
  const div = document.createElement("div");
  div.className = "row mine";
  div.innerHTML = `
    <div>
      <div class="bubble">${nl2br(msg)}</div>
      <div class="meta">${now()}</div>
    </div>
  `;
  chat.appendChild(div);
  scrollChat();
}

function addBot(msg) {
  const div = document.createElement("div");
  div.className = "row theirs";
  div.innerHTML = `
    <div class="avatar">
      <img src="icons/favicon-192-v2.png" alt="ネツリポ">
    </div>
    <div class="msg">
      <div class="bubble">${nl2br(msg)}</div>
      <div class="meta">${now()}</div>
    </div>
  `;
  chat.appendChild(div);
  scrollChat();
}

function addTyping() {
  const div = document.createElement("div");
  div.className = "row theirs typing-row";
  div.id = "typingRow";
  div.innerHTML = `
    <div class="avatar">
      <img src="icons/favicon-192-v2.png" alt="ネツリポ">
    </div>
    <div class="msg">
      <div class="bubble">診断中...</div>
      <div class="meta">${now()}</div>
    </div>
  `;
  chat.appendChild(div);
  scrollChat();
}

function removeTyping() {
  const typing = document.getElementById("typingRow");
  if (typing) typing.remove();
}

async function sendMessage() {
  const msg = text.value.trim();
  if (!msg || send.disabled) return;

  addMine(msg);
  text.value = "";
  send.disabled = true;
  text.disabled = true;
  addTyping();

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        key: API_KEY,
        text: msg
      })
    });

    const data = await res.json();
    removeTyping();

    if (data.ok) {
      addBot(data.reply || "結果を取得できませんでした。");
    } else {
      addBot("エラー: " + (data.error || "不明なエラー"));
    }
  } catch (e) {
    removeTyping();
    addBot("通信エラーが発生しました。時間をおいてもう一度試してください。");
  } finally {
    send.disabled = false;
    text.disabled = false;
    text.focus();
  }
}

send.addEventListener("click", sendMessage);

text.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</html>
