<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ネツリポ</title>

  <!-- favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/favicon-192-v2.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/favicon-512-v2.png">
  <link rel="apple-touch-icon" href="icons/favicon-192-v2.png">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="app">

  <!-- ===== 上部バー ===== -->
  <div class="topbar">
    <img class="app-icon" src="icons/favicon-192-v2.png">
    <div class="topbar-text">
      ネツリポ
      <div class="sub">体調チェックAI</div>
    </div>
  </div>

  <!-- ===== チャット ===== -->
  <div id="chat" class="chat">
    <div class="day"><span id="today"></span></div>

    <div class="row theirs">
      <div class="avatar">
        <img src="icons/favicon-192-v2.png">
      </div>
      <div class="msg">
        <div class="bubble">
          今の体調を送ってね<br>
          例：頭が痛い、少しめまい
        </div>
        <div class="meta">—</div>
      </div>
    </div>
  </div>

  <!-- ===== 入力欄 ===== -->
  <div class="composer">
    <textarea id="text" placeholder="メッセージを入力"></textarea>
    <button id="send">送信</button>
  </div>

</div>

<!-- ===== 下部メニュー ===== -->
<nav class="bottom-nav">

  <a href="index.html" class="nav-item">
    <span class="nav-icon">🏠</span>
    <span class="nav-text">ホーム</span>
  </a>

  <a href="chat.html" class="nav-item active">
    <span class="nav-icon">💬</span>
    <span class="nav-text">熱リポ</span>
  </a>

  <a href="features.html" class="nav-item">
    <span class="nav-icon">📊</span>
    <span class="nav-text">機能表</span>
  </a>

</nav>

<script>
const GAS_URL = "YOUR_GAS_URL";
const API_KEY = "YOUR_API_KEY";

const chat = document.getElementById("chat");
const text = document.getElementById("text");
const send = document.getElementById("send");

document.getElementById("today").textContent =
  new Date().toLocaleDateString();

function now(){
  return new Date().toLocaleTimeString().slice(0,5);
}

function addMine(msg){
  const div = document.createElement("div");
  div.className="row mine";
  div.innerHTML=`<div>
    <div class="bubble">${msg}</div>
    <div class="meta">${now()}</div>
  </div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function addBot(msg){
  const div = document.createElement("div");
  div.className="row theirs";
  div.innerHTML=`<div class="avatar">
    <img src="icons/favicon-192-v2.png">
  </div>
  <div class="msg">
    <div class="bubble">${msg}</div>
    <div class="meta">${now()}</div>
  </div>`;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

async function sendMessage(){
  const msg = text.value.trim();
  if(!msg) return;

  addMine(msg);
  text.value="";
  send.disabled=true;

  try{
    const res = await fetch(GAS_URL,{
      method:"POST",
      body:JSON.stringify({
        key:API_KEY,
        text:msg
      })
    });

    const data = await res.json();
    addBot(data.reply || "エラー");

  }catch(e){
    addBot("通信エラー");
  }

  send.disabled=false;
}

send.onclick = sendMessage;

text.addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
</script>

</body>
</html>
