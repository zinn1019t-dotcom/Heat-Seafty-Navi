<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>熱中症対策</title>
<link rel="stylesheet" href="css/emergency.css">
<link rel="icon" type="image/png" href="icons/favicon-192-v2.png">
<link rel="shortcut icon" href="icons/favicon-192-v2.png">
<link rel="apple-touch-icon" href="icons/favicon-512-v2.png">
</head>
<body>
<div class="app-shell">
<!-- ===== ヘッダー ===== -->
<header class="site-header">
<div class="header-inner">
<div class="site-logo">
<img src="icons/favicon-192-v2.png" alt="ロゴ">
</div>
<div class="header-text">
<h1>💧 熱中症対策</h1>
<p class="lead">

          今すぐできる対策を選んで行動しよう
</p>
</div>
</div>
</header>
<!-- ===== メイン ===== -->
<main class="container">
<section class="card">
<p class="label">すぐにできる対策</p>
<div class="action-grid">
<button class="action-btn" onclick="showAction('water')">💧 水分補給</button>
<button class="action-btn" onclick="showAction('cool')">🧊 体を冷やす</button>
<button class="action-btn" onclick="showAction('shade')">🌳 日陰へ移動</button>
<button class="action-btn" onclick="showAction('rest')">😴 休憩する</button>
</div>
<div id="actionResult" class="action-result">

        ボタンを押すと対策が表示されます
</div>
</section>
<section class="card">
<p class="label">おすすめの使い方</p>
<ul class="advice-list">
<li>暑いと感じたらまず水分補給</li>
<li>違和感があればすぐ休憩</li>
<li>屋外では日陰を優先</li>
<li>無理をしないのが最重要</li>
</ul>
</section>
<section class="note">
<h2>🔍 注意</h2>
<p>

        めまい・吐き気・強いだるさがある場合は、<br>
<strong>すぐに休み、周囲の人に知らせてください。</strong>
</p>
</section>
</main>
<!-- ===== 下部メニュー ===== -->
<nav class="bottom-nav">
<a href="index.html" class="nav-item">
<div class="nav-icon">🏠</div>
<div class="nav-text">ホーム</div>
</a>
<a href="prevention.html" class="nav-item active">
<div class="nav-icon">💧</div>
<div class="nav-text">熱中症対策</div>
</a>
<a href="features.html" class="nav-item">
<div class="nav-icon">📋</div>
<div class="nav-text">機能表</div>
</a>
</nav>
</div>
<footer class="site-footer">
<p>© 熱中症対策ナビ</p>
</footer>
<script>

function showAction(type){

  const el = document.getElementById("actionResult");

  const actions = {

    water: `
<strong>💧 水分補給</strong><br><br>

      ・20〜30分ごとに飲む<br>

      ・のどが渇く前に飲む

    `,

    cool: `
<strong>🧊 冷やす</strong><br><br>

      ・首、わきを冷やす<br>

      ・風を当てると効果UP

    `,

    shade: `
<strong>🌳 日陰へ</strong><br><br>

      ・直射日光を避ける<br>

      ・屋内に入れるなら入る

    `,

    rest: `
<strong>😴 休憩</strong><br><br>

      ・無理せず止まる<br>

      ・座る・横になる

    `

  };

  el.innerHTML = actions[type];

}
</script>
</body>
</html>
